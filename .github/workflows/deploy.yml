name: Deploy Frontend

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Deployment environment'
        required: true
        default: 'production'
        type: choice
        options:
          - production
          - staging
      ref:
        description: 'Git ref to deploy (branch, tag, or commit SHA)'
        required: false
        default: ''

env:
  NODE_VERSION: '20'

jobs:
  deploy:
    name: Deploy to ${{ inputs.environment }}
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref || github.ref }}

      - name: Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run type check
        run: npm run typecheck

      - name: Build
        run: npm run build
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}

      - name: Deploy to ${{ inputs.environment }}
        run: |
          # Placeholder for actual deployment logic
          # Options include:
          # - Netlify: npx netlify deploy --prod --dir=dist
          # - Vercel: npx vercel --prod
          # - GitHub Pages: .github/pages-deploy-action
          # - S3/CloudFront: aws s3 sync dist/ s3://bucket --delete
          
          echo "Build completed. Artifact ready at ./dist"
          echo "Configure deployment steps for your hosting provider."
          
          # Example for Netlify:
          # echo "$NETLIFY_AUTH_TOKEN" | npx netlify login --token
          # npx netlify deploy --prod --dir=dist --message "Deploy from GitHub Actions"
          
          # Example for Vercel:
          # npx vercel --prod --token=$VERCEL_TOKEN

      - name: Deployment Summary
        run: |
          echo "## Deployment Summary" >> $GITHUB_STEP_SUMMARY
          echo "- Environment: ${{ inputs.environment }}" >> $GITHUB_STEP_SUMMARY
          echo "- Ref: ${{ inputs.ref || github.ref }}" >> $GITHUB_STEP_SUMMARY
          echo "- Build artifacts: ./dist" >> $GITHUB_STEP_SUMMARY

  deploy-edge-functions:
    name: Deploy Edge Functions
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment || 'production' }}
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref || github.ref }}

      - name: Setup Deno
        uses: denoland/setup-deno@v1
        with:
          deno-version: v1.x

      - name: Deploy to Supabase
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}
        run: |
          echo "Deploying edge functions..."
          supabase functions deploy
          echo "Edge functions deployed successfully"

  notify:
    name: Notify Deployment
    runs-on: ubuntu-latest
    needs: [deploy, deploy-edge-functions]
    if: always()
    
    steps:
      - name: Deployment Status
        run: |
          if [[ "${{ needs.deploy.result }}" == "success" ]] && [[ "${{ needs.deploy-edge-functions.result }}" == "success" ]]; then
            echo "✅ Deployment completed successfully"
          else
            echo "❌ Deployment failed"
            exit 1
          fi
